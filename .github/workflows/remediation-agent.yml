name: remediation-agent

on:
  workflow_run:
    workflows: [risk-policy-gate]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  remediation-agent:
    name: remediation-agent
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download risk policy artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: risk-policy-report
          path: artifacts

      - name: Parse remediation decision
        id: parse
        run: |
          REPORT="artifacts/risk-policy-report.json"
          test -f "$REPORT"

          decision=$(jq -r '.decision' "$REPORT")
          head_sha=$(jq -r '.head_sha' "$REPORT")
          pr_number=$(jq -r '.pr_number' "$REPORT")
          remediation_enabled=$(jq -r '.rollout.enableRemediation // false' "$REPORT")
          require_label=$(jq -r '.rollout.remediationRequiresLabel // false' "$REPORT")
          pilot_label=$(jq -r '.rollout.remediationPilotLabel // "harness-remediation-pilot"' "$REPORT")

          should_run="false"
          if [ "$decision" = "needs-remediation" ] && [ "$remediation_enabled" = "true" ]; then
            should_run="true"
          fi

          echo "decision=$decision" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "require_label=$require_label" >> "$GITHUB_OUTPUT"
          echo "pilot_label=$pilot_label" >> "$GITHUB_OUTPUT"
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Check pilot label
        if: ${{ steps.parse.outputs.should_run == 'true' && steps.parse.outputs.require_label == 'true' }}
        id: label_guard
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const issue_number = Number('${{ steps.parse.outputs.pr_number }}');
            const expectedLabel = '${{ steps.parse.outputs.pilot_label }}';

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issue_number,
            });

            const labels = (pr.labels || []).map((label) => label.name);
            const allowed = labels.includes(expectedLabel);
            core.setOutput('allowed', String(allowed));
            core.setOutput('labels', labels.join(','));
            core.info(`Remediation pilot label '${expectedLabel}' present: ${allowed}`);

      - name: Checkout PR head branch
        if: ${{ steps.parse.outputs.should_run == 'true' && (steps.parse.outputs.require_label != 'true' || steps.label_guard.outputs.allowed == 'true') }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          clean: false

      - name: Enforce current-head SHA discipline
        if: ${{ steps.parse.outputs.should_run == 'true' && (steps.parse.outputs.require_label != 'true' || steps.label_guard.outputs.allowed == 'true') }}
        run: |
          current_sha=$(git rev-parse HEAD)
          expected_sha="${{ steps.parse.outputs.head_sha }}"
          if [ "$current_sha" != "$expected_sha" ]; then
            echo "Head SHA mismatch. expected=$expected_sha current=$current_sha"
            exit 1
          fi

      - name: Check one-attempt-per-SHA guard
        if: ${{ steps.parse.outputs.should_run == 'true' && (steps.parse.outputs.require_label != 'true' || steps.label_guard.outputs.allowed == 'true') }}
        id: attempt_guard
        run: |
          marker="harness-remediation: ${{ steps.parse.outputs.head_sha }}"
          if git log --oneline --grep "$marker" -n 1 | grep -q .; then
            echo "already_attempted=true" >> "$GITHUB_OUTPUT"
            mkdir -p artifacts
            head_sha="${{ steps.parse.outputs.head_sha }}"
            python3 - "$head_sha" <<'PY'
            import json
            import sys
            from pathlib import Path

            head_sha = sys.argv[1]
            payload = {
                "head_sha_in": head_sha,
                "head_sha_out": head_sha,
                "applied": False,
                "files_touched": [],
                "validation_passed": False,
                "errors": ["max remediation attempts exceeded for SHA"],
            }
            Path("artifacts/remediation-result.json").write_text(
                json.dumps(payload, indent=2, sort_keys=True) + "\n",
                encoding="utf-8",
            )
            PY
          else
            echo "already_attempted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run constrained remediation
        if: ${{ steps.parse.outputs.should_run == 'true' && (steps.parse.outputs.require_label != 'true' || steps.label_guard.outputs.allowed == 'true') && steps.attempt_guard.outputs.already_attempted == 'false' }}
        id: remediate
        env:
          REMEDIATION_APPLY_CMD: ${{ vars.OPENFANG_REMEDIATION_CMD }}
        run: |
          mkdir -p artifacts
          set +e
          python3 scripts/harness/remediation_runner.py \
            --findings artifacts/review-findings.json \
            --head-sha "${{ steps.parse.outputs.head_sha }}" \
            --apply-cmd "${REMEDIATION_APPLY_CMD}" \
            --result-out artifacts/remediation-result.json
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Commit and push remediation fix
        if: ${{ steps.parse.outputs.should_run == 'true' && (steps.parse.outputs.require_label != 'true' || steps.label_guard.outputs.allowed == 'true') && steps.attempt_guard.outputs.already_attempted == 'false' && steps.remediate.outputs.exit_code == '0' }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No remediation changes to commit"
            exit 0
          fi

          git config user.name "openfang-remediation-bot"
          git config user.email "openfang-remediation-bot@users.noreply.github.com"

          git add -A
          git commit -m "chore(harness): remediation for sha:${{ steps.parse.outputs.head_sha }}" -m "harness-remediation: ${{ steps.parse.outputs.head_sha }}"
          git push origin HEAD:${{ github.event.workflow_run.head_branch }}

          new_sha=$(git rev-parse HEAD)
          tmp=$(mktemp)
          jq --arg sha "$new_sha" '.head_sha_out = $sha' artifacts/remediation-result.json > "$tmp"
          mv "$tmp" artifacts/remediation-result.json

      - name: Write skipped remediation result (pilot label missing)
        if: ${{ steps.parse.outputs.should_run == 'true' && steps.parse.outputs.require_label == 'true' && steps.label_guard.outputs.allowed != 'true' }}
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "head_sha_in": "${{ steps.parse.outputs.head_sha }}",
              "head_sha_out": "${{ steps.parse.outputs.head_sha }}",
              "applied": False,
              "files_touched": [],
              "validation_passed": False,
              "errors": [
                  "remediation skipped: missing pilot label '${{ steps.parse.outputs.pilot_label }}'"
              ],
          }
          Path("artifacts/remediation-result.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload remediation artifact
        if: ${{ steps.parse.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: remediation-result
          path: artifacts/remediation-result.json
          if-no-files-found: error

      - name: Fail workflow when remediation fails
        if: ${{ steps.parse.outputs.should_run == 'true' && (steps.parse.outputs.require_label != 'true' || steps.label_guard.outputs.allowed == 'true') && steps.attempt_guard.outputs.already_attempted == 'false' && steps.remediate.outputs.exit_code != '0' }}
        run: |
          echo "Remediation failed. Gate remains blocked."
          exit 1

      - name: Emit workflow failure telemetry
        if: always()
        env:
          OPENFANG_SENTRY_WORKFLOW_EVENTS: ${{ vars.OPENFANG_SENTRY_WORKFLOW_EVENTS || 'true' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          OPENFANG_SENTRY_WORKFLOW_OTLP: ${{ vars.OPENFANG_SENTRY_WORKFLOW_OTLP || 'false' }}
          SENTRY_OTLP_LOGS_ENDPOINT: ${{ secrets.SENTRY_OTLP_LOGS_ENDPOINT || vars.SENTRY_OTLP_LOGS_ENDPOINT || '' }}
          SENTRY_OTLP_TRACES_ENDPOINT: ${{ secrets.SENTRY_OTLP_TRACES_ENDPOINT || vars.SENTRY_OTLP_TRACES_ENDPOINT || '' }}
          SENTRY_OTLP_AUTH_HEADER: ${{ secrets.SENTRY_OTLP_AUTH_HEADER || vars.SENTRY_OTLP_AUTH_HEADER || '' }}
        run: |
          python3 scripts/harness/workflow_sentry_emit.py \
            --workflow "remediation-agent" \
            --job "remediation-agent" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --event "${{ github.event_name }}" \
            --repo "${{ github.repository }}" \
            --head-sha "${{ github.event.workflow_run.head_sha }}" \
            --pr-number "${{ steps.parse.outputs.pr_number }}" \
            --status "${{ job.status }}" \
            --emit "${OPENFANG_SENTRY_WORKFLOW_EVENTS}" \
            --emit-on-failure-only "true" \
            --sentry-dsn-env "SENTRY_DSN" \
            --emit-otlp "${OPENFANG_SENTRY_WORKFLOW_OTLP}" \
            --otlp-logs-endpoint-env "SENTRY_OTLP_LOGS_ENDPOINT" \
            --otlp-traces-endpoint-env "SENTRY_OTLP_TRACES_ENDPOINT" \
            --otlp-auth-header-env "SENTRY_OTLP_AUTH_HEADER" \
            --risk-policy-report artifacts/risk-policy-report.json \
            --review-findings artifacts/review-findings.json \
            --remediation-result artifacts/remediation-result.json \
            --out artifacts/sentry-workflow-emit.json

      - name: Upload workflow telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remediation-agent-sentry-telemetry
          path: artifacts/sentry-workflow-emit.json
          if-no-files-found: warn
