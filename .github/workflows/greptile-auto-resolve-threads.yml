name: greptile-auto-resolve-threads

on:
  workflow_run:
    workflows: [risk-policy-gate]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  greptile-auto-resolve-threads:
    name: greptile-auto-resolve-threads
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download risk policy artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: risk-policy-report
          path: artifacts

      - name: Parse clean-rerun eligibility
        id: parse
        run: |
          REPORT="artifacts/risk-policy-report.json"
          test -f "$REPORT"

          decision=$(jq -r '.decision' "$REPORT")
          review_status=$(jq -r '.review_state.status' "$REPORT")

          should_run="false"
          if [ "$decision" = "pass" ] && [ "$review_status" = "success" ]; then
            should_run="true"
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Resolve bot-only threads
        if: ${{ steps.parse.outputs.should_run == 'true' }}
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.workflow_run.pull_requests?.[0]?.number;
            if (!prNumber) {
              core.setOutput('resolved_count', '0');
              return;
            }

            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const botLogins = ['greptile[bot]'];

            const query = `
              query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100, after: $after) {
                      nodes {
                        id
                        isResolved
                        comments(first: 100) {
                          nodes {
                            author {
                              login
                            }
                          }
                        }
                      }
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                    }
                  }
                }
              }
            `;

            const resolveMutation = `
              mutation($threadId: ID!) {
                resolveReviewThread(input: {threadId: $threadId}) {
                  thread {
                    id
                    isResolved
                  }
                }
              }
            `;

            let after = null;
            let resolvedCount = 0;

            while (true) {
              const data = await github.graphql(query, {
                owner,
                repo,
                number: prNumber,
                after,
              });

              const threads = data.repository.pullRequest.reviewThreads.nodes;
              for (const thread of threads) {
                if (thread.isResolved) {
                  continue;
                }

                const authors = thread.comments.nodes
                  .map((comment) => comment.author?.login || '')
                  .filter(Boolean);

                if (authors.length === 0) {
                  continue;
                }

                if (authors.every((login) => botLogins.includes(login))) {
                  await github.graphql(resolveMutation, { threadId: thread.id });
                  resolvedCount += 1;
                }
              }

              const pageInfo = data.repository.pullRequest.reviewThreads.pageInfo;
              if (!pageInfo.hasNextPage) {
                break;
              }
              after = pageInfo.endCursor;
            }

            core.setOutput('resolved_count', String(resolvedCount));

      - name: Rerun risk-policy-gate after thread resolution
        if: ${{ steps.parse.outputs.should_run == 'true' && steps.resolve.outputs.resolved_count != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
              owner,
              repo,
              run_id: context.payload.workflow_run.id,
            });

      - name: Summary
        if: ${{ steps.parse.outputs.should_run == 'true' }}
        run: |
          echo "## Greptile Auto Resolve" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resolved bot-only threads: ${{ steps.resolve.outputs.resolved_count || '0' }}" >> "$GITHUB_STEP_SUMMARY"
