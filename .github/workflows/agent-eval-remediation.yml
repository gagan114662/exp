name: agent-eval-remediation

on:
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number override for trusted maintainer run"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-eval-remediation-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  resolve-context:
    name: resolve-context
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      head_repo: ${{ steps.ctx.outputs.head_repo }}
      head_ref: ${{ steps.ctx.outputs.head_ref }}
      is_fork: ${{ steps.ctx.outputs.is_fork }}
      labels_csv: ${{ steps.ctx.outputs.labels_csv }}
      should_run: ${{ steps.ctx.outputs.should_run }}
    steps:
      - name: Resolve PR context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const eventName = context.eventName;

            let pr;
            if (eventName === 'pull_request') {
              pr = context.payload.pull_request;
            } else if (eventName === 'workflow_dispatch') {
              const inputPr = Number(core.getInput('pr_number', { required: true }));
              const actor = context.actor;
              const perm = await github.rest.repos.getCollaboratorPermissionLevel({ owner, repo, username: actor });
              const level = String(perm.data.permission || '');
              const allowed = ['admin', 'maintain', 'write'].includes(level);
              if (!allowed) {
                core.setFailed(`workflow_dispatch denied for actor=${actor} permission=${level}`);
                return;
              }
              const prResp = await github.rest.pulls.get({ owner, repo, pull_number: inputPr });
              pr = prResp.data;
            } else {
              core.setFailed(`Unsupported event: ${eventName}`);
              return;
            }

            const prNumber = Number(pr.number);
            const headSha = String(pr.head.sha);
            const headRepo = String(pr.head.repo.full_name);
            const headRef = String(pr.head.ref);
            const isFork = headRepo !== `${owner}/${repo}`;
            const labels = (pr.labels || []).map((label) => String(label.name || ''));

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', headSha);
            core.setOutput('head_repo', headRepo);
            core.setOutput('head_ref', headRef);
            core.setOutput('is_fork', String(isFork));
            core.setOutput('labels_csv', labels.join(','));
            core.setOutput('should_run', 'true');

  agent-eval-remediation:
    name: agent-eval-remediation
    needs: resolve-context
    if: ${{ needs.resolve-context.outputs.should_run == 'true' && needs.resolve-context.outputs.is_fork != 'true' }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENFANG_EVAL_REMEDIATION_CMD: ${{ vars.OPENFANG_EVAL_REMEDIATION_CMD }}
      OPENFANG_EVAL_VALIDATION_CMD: ${{ vars.OPENFANG_EVAL_VALIDATION_CMD }}
      OPENFANG_CODEX_INSTALL_CMD: ${{ vars.OPENFANG_CODEX_INSTALL_CMD }}
      CODEX_AUTH_JSON_B64_PRIMARY: ${{ secrets.CODEX_AUTH_JSON_B64_PRIMARY }}
      CODEX_AUTH_JSON_B64_SECONDARY: ${{ secrets.CODEX_AUTH_JSON_B64_SECONDARY }}
      CODEX_AUTH_JSON_B64_LEGACY: ${{ secrets.CODEX_AUTH_JSON_B64 }}
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve-context.outputs.head_repo }}
          ref: ${{ needs.resolve-context.outputs.head_ref }}
          fetch-depth: 0
          clean: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run infra preflight
        id: preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          set +e
          python3 scripts/harness/infra_preflight.py \
            --contract .harness/policy.contract.json \
            --workflow agent-eval-remediation \
            --repo "${{ github.repository }}" \
            --token-env GITHUB_TOKEN \
            --out artifacts/infra-preflight-report.json
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Upsert infra incident
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/harness/infra_incident_upsert.py \
            --repo "${{ github.repository }}" \
            --token-env GITHUB_TOKEN \
            --contract .harness/policy.contract.json \
            --report artifacts/infra-preflight-report.json \
            --out artifacts/infra-incident-upsert.json

      - name: Enforce infra preflight
        run: |
          if [ "${{ steps.preflight.outputs.exit_code }}" != "0" ]; then
            echo "Infra preflight failed."
            exit 1
          fi

      - name: Install Codex CLI
        run: |
          install_cmd="${OPENFANG_CODEX_INSTALL_CMD:-npm install -g @openai/codex}"
          eval "$install_cmd"
          codex --version

      - name: Resolve automation config
        id: cfg
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          contract = json.loads(Path('.harness/policy.contract.json').read_text(encoding='utf-8'))
          eval_policy = contract.get('agentEvalPolicy', {}) if isinstance(contract.get('agentEvalPolicy'), dict) else {}
          auto = contract.get('automation', {}).get('evalRemediation', {}) if isinstance(contract.get('automation', {}), dict) else {}
          enabled = bool(eval_policy.get('enabled', True) and auto.get('enabled', True))
          trigger_label = str(auto.get('triggerLabel', eval_policy.get('remediationLabel', 'eval-remediate')))
          max_attempts = int(auto.get('maxAttemptsPerSha', 1) or 1)
          max_findings = int(eval_policy.get('maxRemediationFindingsPerRun', 25) or 25)
          with open('/tmp/eval_cfg.out', 'w', encoding='utf-8') as f:
              f.write(f'enabled={str(enabled).lower()}\n')
              f.write(f'trigger_label={trigger_label}\n')
              f.write(f'max_attempts={max_attempts}\n')
              f.write(f'max_findings={max_findings}\n')
          PY
          cat /tmp/eval_cfg.out >> "$GITHUB_OUTPUT"

      - name: Evaluate label gate
        id: label_gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_remediation=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          labels=",${{ needs.resolve-context.outputs.labels_csv }},"
          trigger=",${{ steps.cfg.outputs.trigger_label }},"
          if [[ "$labels" == *"$trigger"* ]]; then
            echo "run_remediation=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_remediation=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run deterministic evals for remediation findings
        if: ${{ steps.label_gate.outputs.run_remediation == 'true' }}
        run: |
          mkdir -p artifacts/agent-evals
          python3 scripts/harness/agent_eval_runner.py \
            --scenarios .harness/evals/scenarios.blocking.json \
            --contract .harness/policy.contract.json \
            --head-sha "${{ needs.resolve-context.outputs.head_sha }}" \
            --profile blocking \
            --seed 42 \
            --out-dir artifacts/agent-evals \
            --enforce false

      - name: Parse eval findings
        id: findings
        if: ${{ steps.label_gate.outputs.run_remediation == 'true' }}
        run: |
          status=$(jq -r '.status' artifacts/agent-evals/eval-findings.json)
          actionable=$(jq '[.findings[] | select(.actionable == true)] | length' artifacts/agent-evals/eval-findings.json)
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "actionable_count=$actionable" >> "$GITHUB_OUTPUT"
          if [ "$status" = "error" ]; then
            echo "Eval findings generation failed"
            exit 1
          fi

      - name: Run constrained eval remediation
        id: remediate
        if: ${{ steps.label_gate.outputs.run_remediation == 'true' && steps.findings.outputs.actionable_count != '0' && steps.cfg.outputs.enabled == 'true' }}
        run: |
          default_cmd="codex exec --json --approval-mode full-auto --quiet 'Read .eval-findings-context.md and fix every listed issue. Keep changes minimal. Only edit project files needed by findings. Run cargo build --workspace --lib before finalizing.'"
          apply_cmd="${OPENFANG_EVAL_REMEDIATION_CMD:-$default_cmd}"
          validation_cmd="${OPENFANG_EVAL_VALIDATION_CMD:-cargo build --workspace --lib}"

          python3 - <<'PY'
          import json
          from pathlib import Path

          findings_path = Path("artifacts/agent-evals/eval-findings.json")
          payload = json.loads(findings_path.read_text(encoding="utf-8"))
          findings = [f for f in payload.get("findings", []) if f.get("actionable")][:10]

          lines = [
              "You are running constrained eval remediation in OpenFang.",
              "Fix actionable eval findings with minimal, safe edits.",
              "Hard constraints:",
              "- Do not edit CI/workflows/secrets unless explicitly required by the finding.",
              "- Keep changes limited to files required by findings.",
              "- Preserve existing policy and remediation guardrails.",
              "",
              "Actionable eval findings:",
          ]

          if findings:
              for finding in findings:
                  path = finding.get("path") or "unknown"
                  line = finding.get("line") or 1
                  summary = finding.get("summary") or "Eval failure"
                  severity = finding.get("severity") or "medium"
                  lines.append(f"- [{severity}] {summary} ({path}:{line})")
          else:
              lines.append("- No actionable findings found.")

          lines.extend(
              [
                  "",
                  "Return only implemented code changes and brief verification notes.",
              ]
          )
          Path(".eval-findings-context.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          set +e
          cmd=(python3 scripts/harness/codex_failover_runner.py \
            --findings artifacts/agent-evals/eval-findings.json \
            --head-sha "${{ needs.resolve-context.outputs.head_sha }}" \
            --max-attempts "${{ steps.cfg.outputs.max_attempts }}" \
            --attempt-log /tmp/eval-remediation-attempts.json \
            --apply-cmd "${apply_cmd}" \
            --result-out artifacts/remediation-result.json \
            --failover-out artifacts/codex-failover-result.json)
          cmd+=(--validation-cmd "${validation_cmd}")

          "${cmd[@]}"
          code=$?
          if [ -f artifacts/codex-failover-result.json ]; then
            final_code=$(jq -r '.final_exit_code // empty' artifacts/codex-failover-result.json)
            if [ -n "$final_code" ]; then
              code="$final_code"
            fi
          fi
          rm -f .eval-findings-context.md
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Write skipped remediation result
        if: ${{ steps.label_gate.outputs.run_remediation != 'true' || steps.findings.outputs.actionable_count == '0' || steps.cfg.outputs.enabled != 'true' }}
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = {
              'head_sha_in': '${{ needs.resolve-context.outputs.head_sha }}',
              'head_sha_out': '${{ needs.resolve-context.outputs.head_sha }}',
              'applied': False,
              'files_touched': [],
              'validation_passed': True,
              'errors': [],
          }
          if '${{ steps.label_gate.outputs.run_remediation }}' != 'true':
              payload['errors'].append('label gate not satisfied for configured trigger label')
          if '${{ steps.cfg.outputs.enabled }}' != 'true':
              payload['errors'].append('eval remediation disabled in contract')
          if '${{ steps.findings.outputs.actionable_count }}' == '0':
              payload['errors'].append('no actionable eval findings detected')

          Path('artifacts/remediation-result.json').write_text(json.dumps(payload, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          Path('artifacts/codex-failover-result.json').write_text(
              json.dumps(
                  {
                      'used_primary': False,
                      'used_secondary': False,
                      'failover_triggered': False,
                      'primary_exit_code': -1,
                      'secondary_exit_code': None,
                      'final_exit_code': 0,
                      'final_account': 'none',
                      'trigger_reason': 'none',
                      'rate_limit_detected': False,
                  },
                  indent=2,
                  sort_keys=True,
              )
              + '\n',
              encoding='utf-8',
          )
          PY

      - name: Commit remediation to bot branch
        id: commit
        if: ${{ steps.label_gate.outputs.run_remediation == 'true' && steps.findings.outputs.actionable_count != '0' && steps.cfg.outputs.enabled == 'true' && steps.remediate.outputs.exit_code == '0' }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="codex/eval-remediation-pr-${{ needs.resolve-context.outputs.pr_number }}"
          git checkout -B "$branch"
          git config user.name "openfang-remediation-bot"
          git config user.email "openfang-remediation-bot@users.noreply.github.com"
          git add -A -- . ':(exclude)artifacts/**' ':(exclude).harness/state/remediation-attempts.json'
          git commit -m "chore(harness): eval remediation for sha:${{ needs.resolve-context.outputs.head_sha }}"
          git push --force-with-lease origin "$branch"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open or update remediation PR
        if: ${{ steps.commit.outputs.changed == 'true' }}
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.commit.outputs.branch }}
          BASE_REF: ${{ needs.resolve-context.outputs.head_ref }}
          ACTIONABLE_COUNT: ${{ steps.findings.outputs.actionable_count }}
          TARGET_PR: ${{ needs.resolve-context.outputs.pr_number }}
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const head = `${owner}:${process.env.BRANCH}`;
            const base = process.env.BASE_REF;
            const actionable = Number(process.env.ACTIONABLE_COUNT || '0');
            const targetPr = Number(process.env.TARGET_PR || '0');

            const body = [
              `Automated eval remediation for PR #${targetPr}.`,
              '',
              `- Actionable eval findings considered: ${actionable}`,
              '- Source: artifacts/agent-evals/eval-findings.json',
              '- Generated by label-gated `agent-eval-remediation` workflow.',
            ].join('\n');

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 100,
            });

            if (existing.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                body,
                title: `chore: eval remediation for PR #${targetPr}`,
              });
            } else {
              await github.rest.pulls.create({
                owner,
                repo,
                head: process.env.BRANCH,
                base,
                title: `chore: eval remediation for PR #${targetPr}`,
                body,
              });
            }

      - name: Emit workflow failure telemetry
        if: always()
        env:
          OPENFANG_SENTRY_WORKFLOW_EVENTS: ${{ vars.OPENFANG_SENTRY_WORKFLOW_EVENTS || 'true' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          status="success"
          if [ "${{ steps.preflight.outputs.exit_code }}" != "0" ]; then
            status="failure"
          fi
          if [ "${{ steps.label_gate.outputs.run_remediation }}" = "true" ] && \
             [ "${{ steps.findings.outputs.actionable_count }}" != "0" ] && \
             [ "${{ steps.cfg.outputs.enabled }}" = "true" ] && \
             [ "${{ steps.remediate.outputs.exit_code }}" != "0" ]; then
            status="failure"
          fi
          if [ "${{ job.status }}" = "failure" ]; then
            status="failure"
          fi
          python3 scripts/harness/workflow_sentry_emit.py \
            --workflow "agent-eval-remediation" \
            --job "agent-eval-remediation" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --event "${{ github.event_name }}" \
            --repo "${{ github.repository }}" \
            --head-sha "${{ needs.resolve-context.outputs.head_sha }}" \
            --pr-number "${{ needs.resolve-context.outputs.pr_number }}" \
            --status "$status" \
            --emit "${OPENFANG_SENTRY_WORKFLOW_EVENTS}" \
            --emit-on-failure-only "true" \
            --sentry-dsn-env "SENTRY_DSN" \
            --infra-preflight-report artifacts/infra-preflight-report.json \
            --eval-results artifacts/agent-evals/eval-results.json \
            --eval-findings artifacts/agent-evals/eval-findings.json \
            --remediation-result artifacts/remediation-result.json \
            --codex-failover-result artifacts/codex-failover-result.json \
            --out artifacts/sentry-workflow-emit.json

      - name: Upload remediation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-remediation-artifacts
          path: |
            artifacts/infra-preflight-report.json
            artifacts/infra-incident-upsert.json
            artifacts/agent-evals/eval-results.json
            artifacts/agent-evals/eval-findings.json
            artifacts/agent-evals/eval-summary.md
            artifacts/remediation-result.json
            artifacts/codex-failover-result.json
            artifacts/sentry-workflow-emit.json
          if-no-files-found: warn

      - name: Fail workflow when remediation fails
        if: ${{ steps.label_gate.outputs.run_remediation == 'true' && steps.findings.outputs.actionable_count != '0' && steps.cfg.outputs.enabled == 'true' && steps.remediate.outputs.exit_code != '0' }}
        run: |
          echo "Eval remediation failed; inspect agent-eval-remediation-artifacts."
          exit 1
