name: sentry-remediation-agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      query:
        description: "Sentry query"
        required: false
        default: "is:unresolved level:error"
      limit:
        description: "Max issues"
        required: false
        default: "20"
      dry_run:
        description: "Dry run"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sentry-remediation-agent
  cancel-in-progress: false

jobs:
  sentry-remediation-agent:
    name: sentry-remediation-agent
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG_SLUG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_SLUG }}
      REMEDIATION_CMD: ${{ vars.OPENFANG_SENTRY_REMEDIATION_CMD }}
      VALIDATION_CMD: ${{ vars.OPENFANG_SENTRY_VALIDATION_CMD }}
      INPUT_QUERY: ${{ inputs.query || 'is:unresolved level:error' }}
      INPUT_LIMIT: ${{ inputs.limit || '20' }}
      INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Collect Sentry findings
        id: collect
        run: |
          mkdir -p artifacts
          python3 scripts/harness/sentry_findings.py \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --query "$INPUT_QUERY" \
            --limit "$INPUT_LIMIT" \
            --allow-missing-token \
            --out artifacts/sentry-findings.json
          status=$(jq -r '.status' artifacts/sentry-findings.json)
          count=$(jq '[.findings[] | select(.actionable)] | length' artifacts/sentry-findings.json)
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "actionable_count=$count" >> "$GITHUB_OUTPUT"
          if [ "$status" = "success" ] && [ "$count" -gt 0 ] && [ -n "$REMEDIATION_CMD" ] && [ "$INPUT_DRY_RUN" != "true" ]; then
            echo "should_remediate=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_remediate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remediate
        if: steps.collect.outputs.should_remediate == 'true'
        run: |
          python3 scripts/harness/remediation_runner.py \
            --findings artifacts/sentry-findings.json \
            --head-sha "$(git rev-parse HEAD)" \
            --apply-cmd "$REMEDIATION_CMD" \
            --result-out artifacts/remediation-result.json || true

      - name: Skip result
        if: steps.collect.outputs.should_remediate != 'true'
        run: |
          mkdir -p artifacts
          echo '{"applied":false}' > artifacts/remediation-result.json

      - name: Open PR
        if: steps.collect.outputs.should_remediate == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --quiet && git diff --cached --quiet && exit 0
          branch="codex/sentry-fix-${{ github.run_id }}"
          git checkout -b "$branch"
          git config user.name "remediation-bot"
          git config user.email "remediation-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore: sentry remediation ${{ github.run_id }}"
          git push origin "$branch"
          gh pr create --title "chore: sentry remediation (${{ steps.collect.outputs.actionable_count }} findings)" --body "Auto-remediation" --base main --head "$branch"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentry-remediation-artifacts
          path: artifacts/
          if-no-files-found: warn
