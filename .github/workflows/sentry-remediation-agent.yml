name: sentry-remediation-agent

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths:
      - .github/workflows/sentry-remediation-agent.yml
  workflow_dispatch:
    inputs:
      query:
        description: "Sentry query"
        required: false
        default: "is:unresolved level:error"
      limit:
        description: "Max issues"
        required: false
        default: "20"
      dry_run:
        description: "Dry run"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: sentry-remediation-agent
  cancel-in-progress: false

jobs:
  sentry-remediation-agent:
    name: sentry-remediation-agent
    runs-on: ubuntu-latest
    env:
      CODEX_HOME: ${{ github.workspace }}/.codex-home
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG_SLUG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_SLUG }}
      REMEDIATION_CMD: ${{ vars.OPENFANG_SENTRY_REMEDIATION_CMD }}
      VALIDATION_CMD: ${{ vars.OPENFANG_SENTRY_VALIDATION_CMD }}
      INPUT_QUERY: ${{ inputs.query || 'is:unresolved level:error' }}
      INPUT_LIMIT: ${{ inputs.limit || '20' }}
      INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: sentry-remediation

      - name: Collect Sentry findings
        id: collect
        run: |
          set -euo pipefail
          mkdir -p artifacts

          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "SENTRY_AUTH_TOKEN is missing or empty"
            exit 1
          fi
          if [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "SENTRY_ORG_SLUG / SENTRY_PROJECT_SLUG variables are missing"
            exit 1
          fi

          python3 scripts/harness/sentry_findings.py \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --query "$INPUT_QUERY" \
            --limit "$INPUT_LIMIT" \
            --out artifacts/sentry-findings.json

          status=$(jq -r '.status' artifacts/sentry-findings.json)
          count=$(jq '[.findings[] | select(.actionable == true)] | length' artifacts/sentry-findings.json)

          echo "Collector status: $status"
          echo "Actionable findings: $count"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "actionable_count=$count" >> "$GITHUB_OUTPUT"

          if [ "$status" != "success" ]; then
            echo "Collector failed. sentry-findings.json:"
            cat artifacts/sentry-findings.json
            exit 1
          fi

          if [ "$count" -gt 0 ] && [ "$INPUT_DRY_RUN" != "true" ] && [ -z "${REMEDIATION_CMD:-}" ]; then
            echo "Actionable findings exist, but OPENFANG_SENTRY_REMEDIATION_CMD is empty."
            exit 1
          fi

          should_remediate="false"
          if [ "$count" -gt 0 ] && [ -n "${REMEDIATION_CMD:-}" ] && [ "$INPUT_DRY_RUN" != "true" ]; then
            should_remediate="true"
          fi

          echo "should_remediate=$should_remediate" >> "$GITHUB_OUTPUT"
          echo "Dry run: $INPUT_DRY_RUN"
          echo "Should remediate: $should_remediate"

      - name: Write summary
        if: always()
        run: |
          echo "## Sentry Remediation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Collector status: ${{ steps.collect.outputs.status || 'failed' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Actionable findings: ${{ steps.collect.outputs.actionable_count || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Should remediate: ${{ steps.collect.outputs.should_remediate || 'false' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node for Codex
        if: ${{ steps.collect.outputs.should_remediate == 'true' && contains(env.REMEDIATION_CMD, 'codex') }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure Codex CLI and auth
        if: ${{ steps.collect.outputs.should_remediate == 'true' && contains(env.REMEDIATION_CMD, 'codex') }}
        env:
          CODEX_INSTALL_CMD: ${{ vars.OPENFANG_CODEX_INSTALL_CMD }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail

          if ! command -v codex >/dev/null 2>&1; then
            if [ -n "${CODEX_INSTALL_CMD:-}" ]; then
              echo "Installing codex via OPENFANG_CODEX_INSTALL_CMD..."
              bash -lc "$CODEX_INSTALL_CMD"
            else
              echo "codex CLI not found on runner."
              echo "Set repo variable OPENFANG_CODEX_INSTALL_CMD (example: npm install -g @openai/codex)"
              exit 1
            fi
          fi

          codex --version || true

          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"

          if [ -n "${CODEX_AUTH_JSON_B64:-}" ]; then
            printf '%s' "$CODEX_AUTH_JSON_B64" | base64 --decode > "$CODEX_HOME/auth.json"
          elif [ -n "${CODEX_AUTH_JSON:-}" ]; then
            printf '%s\n' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
          fi

          if [ -f "$CODEX_HOME/auth.json" ]; then
            chmod 600 "$CODEX_HOME/auth.json"
            if ! codex login status > /tmp/codex-login-status.log 2>&1; then
              echo "::error::Codex auth.json is present but login status check failed."
              cat /tmp/codex-login-status.log || true
              echo "Refresh your CI auth secret from a valid local Codex login."
              echo "Example: base64 < ~/.codex/auth.json | tr -d '\\n'"
              echo "Update GitHub secret CODEX_AUTH_JSON_B64 with that value."
              exit 1
            fi
            cat /tmp/codex-login-status.log

            if ! timeout 120 codex exec --skip-git-repo-check --ephemeral --color never "Reply with OK only." > /tmp/codex-auth-smoke.log 2>&1; then
              echo "::error::Codex authenticated smoke test failed. auth.json may be expired or invalid."
              tail -n 120 /tmp/codex-auth-smoke.log || true
              echo "Refresh local Codex login, then update CODEX_AUTH_JSON_B64."
              echo "Command: base64 < ~/.codex/auth.json | tr -d '\\n'"
              exit 1
            fi
          elif [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "Using OPENAI_API_KEY auth mode for codex."
          else
            echo "Missing Codex auth for CI."
            echo "Set CODEX_AUTH_JSON_B64 (preferred) or CODEX_AUTH_JSON."
            echo "You can also fallback to OPENAI_API_KEY."
            exit 1
          fi

      - name: Run constrained remediation
        if: ${{ steps.collect.outputs.should_remediate == 'true' }}
        id: remediate
        timeout-minutes: 12
        run: |
          set +e

          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("artifacts/sentry-findings.json").read_text(encoding="utf-8"))
          findings = [f for f in payload.get("findings", []) if f.get("actionable")][:10]

          lines = [
              "You are running constrained Sentry remediation in OpenFang.",
              "Fix actionable errors with minimal, safe edits.",
              "Hard constraints:",
              "- Do not touch CI/workflows/secrets/config for this task.",
              "- Do not introduce prompt or PII leakage.",
              "- Keep changes limited to files required by findings.",
              "- Do not run long test/build commands; CI validation runs in a separate step.",
              "",
              "Actionable findings:",
          ]

          for finding in findings:
              path = finding.get("path") or "unknown"
              line = finding.get("line") or 1
              summary = finding.get("summary") or "Sentry issue"
              severity = finding.get("severity") or "medium"
              lines.append(f"- [{severity}] {summary} ({path}:{line})")

          if not findings:
              lines.append("- None")

          lines.append("")
          lines.append("Return only implemented code changes and brief verification notes.")
          Path(".sentry-findings-context.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          python3 scripts/harness/remediation_runner.py \
            --findings artifacts/sentry-findings.json \
            --head-sha "$(git rev-parse HEAD)" \
            --apply-cmd "$REMEDIATION_CMD" \
            --attempt-log /tmp/sentry-remediation-attempts.json \
            --result-out artifacts/remediation-result.json
          code=$?

          rm -f .sentry-findings-context.md

          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Validate remediation changes
        if: ${{ steps.collect.outputs.should_remediate == 'true' && steps.remediate.outputs.exit_code == '0' && env.VALIDATION_CMD != '' }}
        timeout-minutes: 20
        run: |
          set -euo pipefail
          echo "Installing validation system dependencies..."
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          echo "Running post-remediation validation..."
          timeout 1200 bash -lc "$VALIDATION_CMD"

      - name: Write skipped remediation result
        if: ${{ steps.collect.outputs.should_remediate != 'true' }}
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "head_sha_in": "",
              "head_sha_out": "",
              "applied": False,
              "files_touched": [],
              "validation_passed": False,
              "errors": ["remediation skipped: no actionable findings or dry_run enabled"],
          }
          Path("artifacts/remediation-result.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit and push remediation branch
        if: ${{ steps.collect.outputs.should_remediate == 'true' && steps.remediate.outputs.exit_code == '0' }}
        id: commit
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="codex/sentry-remediation-${{ github.run_id }}-${{ github.run_attempt }}"
          git checkout -b "$branch"
          git config user.name "openfang-remediation-bot"
          git config user.email "openfang-remediation-bot@users.noreply.github.com"
          git add -A -- . ':(exclude)artifacts/**' ':(exclude).sentry-findings-context.md'
          git commit -m "chore(harness): sentry remediation run ${{ github.run_id }}"
          git push origin "$branch"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: ${{ steps.commit.outputs.changed == 'true' }}
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.commit.outputs.branch }}
          ACTIONABLE_COUNT: ${{ steps.collect.outputs.actionable_count }}
        with:
          script: |
            const fs = require('fs');
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const branch = process.env.BRANCH;
            const actionableCount = Number(process.env.ACTIONABLE_COUNT || '0');

            const findings = JSON.parse(fs.readFileSync('artifacts/sentry-findings.json', 'utf8'));
            const topFindings = (findings.findings || []).filter((f) => f.actionable).slice(0, 5);
            const bullets = topFindings.map((f) => {
              const path = f.path ? ` (${f.path}:${f.line || 1})` : '';
              return `- ${f.summary}${path}`;
            });

            const body = [
              'Automated Sentry remediation run.',
              '',
              `- Actionable findings considered: ${actionableCount}`,
              '',
              'Top findings:',
              ...(bullets.length ? bullets : ['- No actionable findings listed']),
              '',
              'Generated by `sentry-remediation-agent` with constrained guardrails.',
            ].join('\n');

            await github.rest.pulls.create({
              owner,
              repo,
              head: branch,
              base: 'main',
              title: `chore: automated sentry remediation (${actionableCount} findings)`,
              body,
            });

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentry-remediation-artifacts
          path: |
            artifacts/sentry-findings.json
            artifacts/remediation-result.json
          if-no-files-found: error

      - name: Fail when remediation command fails
        if: ${{ steps.collect.outputs.should_remediate == 'true' && steps.remediate.outputs.exit_code != '0' }}
        run: |
          echo "Sentry remediation failed; check sentry-remediation-artifacts."
          exit 1
